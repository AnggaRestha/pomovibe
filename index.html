<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PomoVibe — Complete Focus Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
        }
        .timer-running { animation: pulse-soft 2s infinite ease-in-out; }
        
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }
    </style>
</head>
<body id="body-bg" class="min-h-screen flex items-center justify-center p-6 transition-all duration-300">

    <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-3 gap-8 items-start justify-center">
        
        <div class="glass p-10 rounded-[40px] shadow-2xl text-center text-white">
            <div class="grid grid-cols-3 p-1.5 bg-black/20 rounded-2xl mb-10 gap-1.5 justify-items-stretch items-center">
                <button onclick="switchMode('pomodoro')" id="btn-pomodoro" class="py-2.5 rounded-xl text-xs font-bold transition-all bg-white text-rose-600 shadow-lg text-center truncate">Focus</button>
                <button onclick="switchMode('short')" id="btn-short" class="py-2.5 rounded-xl text-xs font-bold transition-all hover:bg-white/10 text-white/80 text-center truncate">Short Break</button>
                <button onclick="switchMode('long')" id="btn-long" class="py-2.5 rounded-xl text-xs font-bold transition-all hover:bg-white/10 text-white/80 text-center truncate">Long Break</button>
            </div>

            <div id="timer-container" class="relative mb-10 transition-all duration-500">
                <h1 id="timer-display" class="text-[90px] font-extrabold leading-none tracking-tighter drop-shadow-2xl font-mono">25:00</h1>
                <p id="mode-text" class="text-sm font-light uppercase tracking-[0.3em] opacity-80 mt-4">Time to Focus</p>
            </div>

            <div class="flex flex-col gap-4">
                <button id="btn-start" class="w-full py-5 bg-white text-rose-600 font-extrabold text-xl rounded-2xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all cursor-pointer uppercase tracking-widest">
                    Start Session
                </button>
                <button id="btn-reset" class="text-white/60 hover:text-white font-medium text-sm transition-all cursor-pointer">
                    Reset Timer
                </button>
            </div>
        </div>

        <div class="w-full flex flex-col gap-6">
            <div class="glass p-8 rounded-[35px] shadow-2xl text-white flex flex-col h-[335px]">
                <h3 class="font-bold text-xl mb-1 flex items-center gap-2">
                    📋 Tasks 
                    <span id="task-count" class="text-xs bg-white/20 px-2 py-0.5 rounded-full">0</span>
                </h3>
                <p class="text-xs opacity-60 mb-4">Apa rencana fokusmu hari ini?</p>
                
                <form id="task-form" class="flex gap-2 mb-4">
                    <input type="text" id="task-input" placeholder="Tambah tugas baru..." required
                        class="flex-1 px-4 py-3 bg-black/20 rounded-xl border border-white/10 text-white placeholder-white/40 focus:outline-hidden focus:border-white/40 text-sm">
                    <button type="submit" class="px-4 py-3 bg-white text-rose-600 font-bold rounded-xl text-sm hover:bg-opacity-90 active:scale-95 transition-all cursor-pointer" id="btn-task-add">+</button>
                </form>

                <ul id="task-list" class="flex-1 overflow-y-auto space-y-2 pr-1 custom-scrollbar"></ul>
            </div>

            <div class="glass p-6 rounded-[30px] text-white/90">
                <h3 class="font-bold mb-1 text-sm tracking-wide">📊 Today's Progress</h3>
                <div class="flex justify-between items-end mt-4">
                    <div>
                        <span id="session-count" class="text-3xl font-extrabold">0</span>
                        <span class="text-sm opacity-70">sessions</span>
                    </div>
                    <div class="text-right">
                        <span id="minute-count" class="text-3xl font-extrabold">0</span>
                        <span class="text-sm opacity-70">mins</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full flex flex-col gap-6">
            
            <div class="glass p-6 rounded-[35px] shadow-xl text-white">
                <h3 class="font-bold text-sm tracking-wide mb-2 flex items-center gap-2">
                    🎨 Custom Gradient Slider
                </h3>
                <p class="text-xs opacity-60 mb-4">Geser & sesuaikan spektrum warna sesukamu:</p>
                
                <div class="bg-black/20 p-4 rounded-2xl flex items-center justify-around gap-4">
                    <div class="flex flex-col items-center gap-1.5">
                        <span class="text-[10px] uppercase tracking-wider opacity-60">Color 1</span>
                        <input type="color" id="color-picker-1" value="#f43f5e" 
                            class="w-12 h-12 rounded-full cursor-pointer border-2 border-white/30 bg-transparent">
                    </div>
                    
                    <div class="text-white/30 text-xl">➔</div>

                    <div class="flex flex-col items-center gap-1.5">
                        <span class="text-[10px] uppercase tracking-wider opacity-60">Color 2</span>
                        <input type="color" id="color-picker-2" value="#ea580c" 
                            class="w-12 h-12 rounded-full cursor-pointer border-2 border-white/30 bg-transparent">
                    </div>
                </div>
            </div>

            <div class="glass p-6 rounded-[35px] shadow-xl text-white">
                <h3 class="font-bold text-sm tracking-wide mb-3 flex items-center gap-2">
                    🎧 Focus Ambient Sound
                </h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="selectAmbient('none')" id="ambient-none" class="py-2.5 bg-white text-rose-600 text-xs font-bold rounded-xl border border-white/20 transition-all shadow-md">
                        🔇 Silent
                    </button>
                    <button onclick="selectAmbient('rain')" id="ambient-rain" class="py-2.5 bg-black/20 text-white text-xs font-bold rounded-xl border border-white/10 hover:bg-black/40 transition-all">
                        🌧️ Cozy Rain
                    </button>
                </div>
                <div class="mt-4 flex items-center gap-3">
                    <span class="text-xs opacity-70">Vol</span>
                    <input type="range" id="ambient-volume" min="0" max="1" step="0.1" value="0.5" 
                        class="w-full h-1 bg-white/20 rounded-lg appearance-none cursor-pointer accent-white">
                </div>
            </div>

            <div class="glass p-5 rounded-[30px] shadow-xl overflow-hidden">
                <iframe style="border-radius:20px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DWWQRwui0ExPn?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <audio id="alert-sound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>
    <audio id="audio-rain" src="hujan.mp3" loop preload="auto"></audio>

    <script>
        // TIMER STATE
        let timeLeft = 25 * 60;
        let timerId = null;
        let currentMode = 'pomodoro';
        let stats = JSON.parse(localStorage.getItem('pomoStats')) || { sessions: 0, mins: 0 };

        // AMBIENT STATE
        let selectedAmbientMode = 'none';
        const rainAudio = document.getElementById('audio-rain');
        const volumeSlider = document.getElementById('ambient-volume');

        // COLOR STATE
        const colorPicker1 = document.getElementById('color-picker-1');
        const colorPicker2 = document.getElementById('color-picker-2');

        const modes = {
            pomodoro: { time: 25 * 60, text: 'Time to Focus', c1: '#f43f5e', c2: '#ea580c' },
            short: { time: 5 * 60, text: 'Take a Breath', c1: '#2dd4bf', c2: '#059669' },
            long: { time: 15 * 60, text: 'Deep Relaxation', c1: '#6366f1', c2: '#a855f7' }
        };

        const display = document.getElementById('timer-display');
        const modeText = document.getElementById('mode-text');
        const bodyBg = document.getElementById('body-bg');
        const startBtn = document.getElementById('btn-start');
        const resetBtn = document.getElementById('btn-reset');
        const timerContainer = document.getElementById('timer-container');

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            display.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateStatsDisplay() {
            document.getElementById('session-count').textContent = stats.sessions;
            document.getElementById('minute-count').textContent = stats.mins;
        }

        // ENGINE RENDER WARNA GRADASI
        function applyGradient(c1, c2) {
            bodyBg.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
            startBtn.style.color = c1;
            document.getElementById('btn-task-add').style.color = c1;
            updateActiveButtonStyles(c1);
        }

        function handleColorPickerInput() {
            modes[currentMode].c1 = colorPicker1.value;
            modes[currentMode].c2 = colorPicker2.value;
            applyGradient(modes[currentMode].c1, modes[currentMode].c2);
        }

        colorPicker1.addEventListener('input', handleColorPickerInput);
        colorPicker2.addEventListener('input', handleColorPickerInput);

        // FIX: Menjaga struktur grid agar tidak berantakan saat tombol diklik
        function updateActiveButtonStyles(activeColor) {
            ['pomodoro', 'short', 'long'].forEach(m => {
                const btn = document.getElementById(`btn-${m}`);
                if (m === currentMode) {
                    btn.className = "py-2.5 rounded-xl text-xs font-bold transition-all bg-white shadow-lg text-center truncate";
                    btn.style.color = activeColor;
                } else {
                    btn.className = "py-2.5 rounded-xl text-xs font-bold transition-all hover:bg-white/10 text-white/80 text-center truncate";
                    btn.style.color = '';
                }
            });

            ['none', 'rain'].forEach(type => {
                const btn = document.getElementById(`ambient-${type}`);
                if (type === selectedAmbientMode) {
                    btn.className = "py-2.5 bg-white text-xs font-bold rounded-xl border border-white/20 transition-all shadow-md";
                    btn.style.color = activeColor;
                } else {
                    btn.className = "py-2.5 bg-black/20 text-white text-xs font-bold rounded-xl border border-white/10 hover:bg-black/40 transition-all";
                    btn.style.color = '';
                }
            });
        }

        // SWITCH MODE
        function switchMode(mode) {
            currentMode = mode;
            timeLeft = modes[mode].time;
            modeText.textContent = modes[mode].text;
            
            clearInterval(timerId);
            timerId = null;
            startBtn.textContent = 'Start Session';
            timerContainer.classList.remove('timer-running');
            handleAmbientPlayback('pause');

            colorPicker1.value = modes[mode].c1;
            colorPicker2.value = modes[mode].c2;
            
            applyGradient(modes[mode].c1, modes[mode].c2);
            updateDisplay();
        }

        // KONTROL AUDIO AMBIENT
        window.selectAmbient = function(type) {
            selectedAmbientMode = type;
            applyGradient(modes[currentMode].c1, modes[currentMode].c2);

            if (type === 'rain') {
                rainAudio.play().then(() => {
                    if (timerId === null) rainAudio.pause();
                }).catch(e => console.log(e));
            } else {
                rainAudio.pause();
            }
        }

        volumeSlider.addEventListener('input', (e) => { rainAudio.volume = e.target.value; });

        function handleAmbientPlayback(action) {
            if (selectedAmbientMode === 'rain' && currentMode === 'pomodoro') {
                if (action === 'play') {
                    rainAudio.play().catch(e => console.log(e));
                } else {
                    rainAudio.pause();
                }
            } else {
                rainAudio.pause();
            }
        }

        function toggleTimer() {
            if (timerId === null) {
                startBtn.textContent = 'Pause Session';
                timerContainer.classList.add('timer-running');
                
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerId);
                        timerId = null;
                        
                        handleAmbientPlayback('pause');
                        document.getElementById('alert-sound').play().catch(e => console.log(e));
                        
                        if (currentMode === 'pomodoro') {
                            stats.sessions += 1;
                            stats.mins += 25;
                            localStorage.setItem('pomoStats', JSON.stringify(stats));
                            updateStatsDisplay();
                        }

                        alert("Session complete!");
                        resetTimer();
                    }
                }, 1000);

                handleAmbientPlayback('play');
            } else {
                clearInterval(timerId);
                timerId = null;
                startBtn.textContent = 'Resume Session';
                timerContainer.classList.remove('timer-running');
                
                handleAmbientPlayback('pause');
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = modes[currentMode].time;
            startBtn.textContent = 'Start Session';
            timerContainer.classList.remove('timer-running');
            handleAmbientPlayback('pause');
            updateDisplay();
        }

        // TASK LIST LOGIC
        let tasks = JSON.parse(localStorage.getItem('pomoTasks')) || [];
        const taskForm = document.getElementById('task-form');
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');
        const taskCount = document.getElementById('task-count');

        function renderTasks() {
            taskList.innerHTML = '';
            taskCount.textContent = tasks.length;
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-3 bg-white/10 rounded-xl transition-all ${task.completed ? 'opacity-50 line-through' : ''}`;
                li.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="toggleTask(${index})">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} class="w-4 h-4 rounded-sm accent-rose-500 pointer-events-none">
                        <span class="text-sm tracking-wide break-all">${task.text}</span>
                    </div>
                    <button onclick="deleteTask(${index})" class="text-white/40 hover:text-rose-300 px-2 text-xs transition-colors">✕</button>
                `;
                taskList.appendChild(li);
            });
            localStorage.setItem('pomoTasks', JSON.stringify(tasks));
        }

        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = taskInput.value.trim();
            if (text) {
                tasks.push({ text, completed: false });
                taskInput.value = '';
                renderTasks();
            }
        });

        window.toggleTask = function(index) { tasks[index].completed = !tasks[index].completed; renderTasks(); }
        window.deleteTask = function(index) { tasks.splice(index, 1); renderTasks(); }

        // RUN ON LOAD
        rainAudio.volume = 0.5;
        updateDisplay();
        renderTasks();
        updateStatsDisplay();
        applyGradient(modes[currentMode].c1, modes[currentMode].c2);
    </script>
</body>
</html>
